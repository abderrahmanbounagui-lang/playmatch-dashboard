<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PlayMatch — Owner Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0A0E0C; color: #E8EDEB; font-family: "Inter Tight", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, select { font-family: inherit; }
  ::selection { background: oklch(0.78 0.18 142 / 0.3); }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }
  .page-fade { animation: fadeIn 0.3s ease-out; }

  /* Responsive */
  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .charts-grid { grid-template-columns: 1fr !important; }
    .cal-grid { grid-template-columns: 1fr !important; }
    .rev-grid { grid-template-columns: 1fr !important; }
    .rev-bottom { grid-template-columns: 1fr !important; }
    .settings-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Reuse Icon and T from the app primitives -->
<script type="text/babel" src="screens/tokens.jsx"></script>
<script type="text/babel" src="dashboard/core.jsx"></script>
<script type="text/babel" src="dashboard/pages.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;
  const { D, Sidebar, Topbar, NAV } = window.DashboardCore;
  const { OverviewPage, PitchesPage, BookingsPage, CalendarPage, RevenuePage, SettingsPage } = window.DashboardPages;

  const PAGES = {
    overview: { Component: OverviewPage, title: 'Overview' },
    pitches:  { Component: PitchesPage,  title: 'My Pitches' },
    bookings: { Component: BookingsPage, title: 'Bookings' },
    calendar: { Component: CalendarPage, title: 'Calendar' },
    revenue:  { Component: RevenuePage,  title: 'Revenue' },
    settings: { Component: SettingsPage, title: 'Settings' },
  };

  function App() {
    const [active, setActive] = useState(() => {
      const hash = window.location.hash.replace('#', '');
      return PAGES[hash] ? hash : 'overview';
    });
    const [collapsed, setCollapsed] = useState(false);

    useEffect(() => {
      window.location.hash = active;
      window.scrollTo(0, 0);
    }, [active]);

    const Page = PAGES[active].Component;

    return (
      <div data-screen-label={PAGES[active].title} style={{
        display: 'flex', minHeight: '100vh',
        background: D.bg, color: D.text, fontFamily: D.font,
      }}>
        <Sidebar active={active} onNav={setActive} collapsed={collapsed} setCollapsed={setCollapsed} />
        <main style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
          <Topbar title={PAGES[active].title} />
          <div key={active} className="page-fade" style={{ padding: '28px 32px 60px', flex: 1 }}>
            <Page />
          </div>
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
